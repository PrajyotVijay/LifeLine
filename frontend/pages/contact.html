<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - LifeLine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-white text-gray-700">

  <div id="navbar"></div>

  <div class="max-w-6xl mx-auto px-4 py-16">

    <!-- Page Header -->
    <div class="text-center mb-12">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-red-100 rounded-full mb-6">
        <i data-lucide="mail" class="w-8 h-8 text-red-600"></i>
      </div>
      <h1 class="text-4xl md:text-5xl font-bold text-gray-900 mb-4">Contact Us</h1>
      <p class="text-xl text-gray-600 max-w-2xl mx-auto">
        Have questions? We'd love to hear from you. Send us a message and we'll respond as soon as possible.
      </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

      <!-- Contact Info -->
      <div class="flex flex-col gap-6">
        <div class="bg-white p-6 rounded-xl shadow border border-gray-100 flex gap-4 items-start">
          <div class="w-11 h-11 bg-red-100 rounded-lg flex items-center justify-center flex-shrink-0">
            <i data-lucide="mail" class="w-5 h-5 text-red-600"></i>
          </div>
          <div>
            <h3 class="font-bold text-gray-900 mb-1">Email</h3>
            <p class="text-gray-600 text-sm">support@lifeline.org</p>
          </div>
        </div>
        <div class="bg-white p-6 rounded-xl shadow border border-gray-100 flex gap-4 items-start">
          <div class="w-11 h-11 bg-red-100 rounded-lg flex items-center justify-center flex-shrink-0">
            <i data-lucide="phone" class="w-5 h-5 text-red-600"></i>
          </div>
          <div>
            <h3 class="font-bold text-gray-900 mb-1">Phone</h3>
            <p class="text-gray-600 text-sm">+91 98765 43210</p>
          </div>
        </div>
        <div class="bg-white p-6 rounded-xl shadow border border-gray-100 flex gap-4 items-start">
          <div class="w-11 h-11 bg-red-100 rounded-lg flex items-center justify-center flex-shrink-0">
            <i data-lucide="map-pin" class="w-5 h-5 text-red-600"></i>
          </div>
          <div>
            <h3 class="font-bold text-gray-900 mb-1">Address</h3>
            <p class="text-gray-600 text-sm">Mumbai, Maharashtra, India</p>
          </div>
        </div>
      </div>

      <!-- Contact Form -->
      <div class="md:col-span-2 bg-white p-8 rounded-xl shadow-lg border border-gray-100">
        <h2 class="text-2xl font-bold text-gray-900 mb-6">Send a Message</h2>

        <div id="alertBox"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Name</label>
            <input type="text" id="name" placeholder="Your name"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
            <input type="email" id="email" placeholder="your@email.com"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent" />
          </div>
        </div>

        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-1">Subject</label>
          <input type="text" id="subject" placeholder="How can we help?"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent" />
        </div>

        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-700 mb-1">Message</label>
          <textarea id="message" rows="5" placeholder="Your message..."
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent resize-none"></textarea>
        </div>

        <button onclick="submitContact()"
          class="w-full flex items-center justify-center gap-2 px-6 py-3 bg-red-600 text-white rounded-lg font-semibold hover:bg-red-700 transition-all">
          <i data-lucide="send" class="w-5 h-5"></i> Send Message
        </button>
      </div>

    </div>
  </div>

  <div id="footer"></div>

  <script src="../js/shared.js"></script>
  <script>
    document.getElementById('navbar').innerHTML = renderNavbar('contact');
    document.getElementById('footer').innerHTML = renderFooter();
    lucide.createIcons();

    async function submitContact() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const subject = document.getElementById('subject').value.trim();
      const message = document.getElementById('message').value.trim();

      if (!name || !email || !subject || !message) {
        showAlert('alertBox', 'All fields are required.', 'error');
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/contacts`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, subject, message })
        });

        const data = await res.json();

        if (res.ok) {
          showAlert('alertBox', 'Thank you! Your message has been sent successfully.', 'success');
          document.getElementById('name').value = '';
          document.getElementById('email').value = '';
          document.getElementById('subject').value = '';
          document.getElementById('message').value = '';
        } else {
          showAlert('alertBox', data.error || 'Failed to send message.', 'error');
        }
      } catch (err) {
        showAlert('alertBox', 'Network error. Make sure backend is running.', 'error');
      }
    }
  </script>

</body>
</html>
